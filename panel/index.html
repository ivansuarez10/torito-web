<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Panel · El Torito</title>
<meta name="theme-color" content="#000000" />
<meta name="robots" content="noindex" />
<link rel="icon" href="../img/logo.png" />
<style>
  :root{--bg:#000;--card:#161616;--card2:#232323;--cream:#f2f2f2;--muted:#8f8f8f;--line:#242424;--red:#E4232A;--red-d:#c11c22;--ok:#25D366;--gold:#cfcfcf}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--cream);line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:16px;padding-bottom:120px}
  input,select,button,textarea{font-family:inherit}
  a{color:var(--red)}

  /* login */
  .login{max-width:380px;margin:8vh auto;text-align:center;padding:0 20px}
  .login img{height:52px;filter:brightness(0) invert(1);margin-bottom:18px}
  .login h1{font-size:22px;font-weight:800;letter-spacing:-.01em}
  .login p{color:var(--muted);font-size:14px;margin:6px 0 22px}
  .fld{margin-bottom:12px;text-align:left}
  .fld label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .fld input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 14px;color:var(--cream);font-size:16px;outline:none}
  .fld input:focus{border-color:var(--red)}
  .btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:16px;cursor:pointer;transition:background .2s}
  .btn:hover{background:var(--red-d)} .btn:disabled{opacity:.5;cursor:default}
  .msg{font-size:13px;margin-top:12px;min-height:18px}
  .msg.err{color:#ff8a8a} .msg.ok{color:var(--ok)}

  /* app */
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 16px;border-bottom:1px solid var(--line);margin-bottom:16px;position:sticky;top:0;background:var(--bg);z-index:5}
  .top .l{display:flex;align-items:center;gap:10px}
  .top img{height:26px;filter:brightness(0) invert(1)}
  .top .t{font-weight:800;letter-spacing:.06em;font-size:14px}
  .top .r{display:flex;gap:8px;align-items:center}
  .lo{background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer}
  .save{background:var(--ok);border:none;color:#04240f;border-radius:9px;padding:9px 16px;font-weight:800;font-size:14px;cursor:pointer}
  .save:disabled{opacity:.5}
  .savebar{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:20;width:min(788px,calc(100% - 24px));display:none}
  .savebar.show{display:block}
  .savebar button{width:100%;background:var(--ok);border:none;color:#04240f;border-radius:100px;padding:16px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 10px 30px rgba(37,211,102,.35)}

  .hint{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--muted);font-size:12.5px;margin-bottom:16px}
  .hint b{color:var(--gold)}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:20px}
  .meta .fld{margin:0} .meta .full{grid-column:1/-1}
  .meta input{background:var(--card2)}

  .cat{margin-bottom:22px}
  .cat h2{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--gold);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .cat .addbtn{background:var(--card2);border:1px solid var(--line);color:var(--cream);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700;cursor:pointer}
  .row{display:grid;grid-template-columns:1fr 104px 42px 38px;grid-template-areas:"nm nm nm nm" "pr ty tg del" "desc desc desc desc" "cuts cuts cuts cuts";gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:8px}
  .row.off{opacity:.5}
  .row .nm{grid-area:nm} .row .pr{grid-area:pr} .row .ty{grid-area:ty} .row .tg{grid-area:tg} .row .del{grid-area:del}
  .row .desc{grid-area:desc;font-size:13px}
  .row .cutswrap{grid-area:cuts;display:flex;gap:8px;align-items:center} .row .cuts{flex:1;font-size:13px} .row .mx{width:132px;flex:none;font-size:13px}
  .row input,.row select{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--cream);font-size:15px;outline:none;width:100%}
  .row input:focus,.row select:focus{border-color:var(--red)}
  .row .nm{font-weight:600} .row .pr{text-align:right;font-weight:700}
  .row .tg{height:42px;border-radius:8px;border:1px solid var(--line);background:var(--card2);cursor:pointer;font-size:16px;display:grid;place-items:center}
  .row .tg.on{background:rgba(37,211,102,.15);border-color:var(--ok);color:var(--ok)}
  .row .del{height:42px;border-radius:8px;border:1px solid var(--line);background:none;color:var(--muted);cursor:pointer;font-size:15px}
  .row .del:hover{color:#ff8a8a;border-color:#ff8a8a}
  @media(min-width:560px){.row{grid-template-columns:1fr 104px 130px 42px 38px;grid-template-areas:"nm pr ty tg del" "desc desc desc desc desc" "cuts cuts cuts cuts cuts"}}
  .loading{text-align:center;color:var(--muted);padding:50px}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  "use strict";
  var SUPA_URL="https://dnyzokgmjuvbrcxxdatr.supabase.co", SUPA_KEY="sb_publishable_jO4pGdkTBporf_cndos9OA_K_8tVn3A";
  var CFG_KEY="store_catalog";
  var supa = window.supabase ? window.supabase.createClient(SUPA_URL,SUPA_KEY) : null;
  var app=document.getElementById("app");
  var DATA=null, dirty=false;
  var CAT_LABELS={res:"Res",cerdo:"Cerdo",pollo:"Pollo",embutidos:"Embutidos",visceras:"Vísceras",extras:"Extras"};

  // ---------- Auth ----------
  function loginView(msg,cls){
    app.innerHTML=
      '<div class="login"><img src="../img/logo.png" alt="El Torito"/>'+
      '<h1>Panel de administración</h1><p>Ingresá con tu correo y contraseña de El Torito.</p>'+
      '<div class="fld"><label>Correo</label><input id="email" type="email" autocomplete="username" placeholder="admin@eltorito.hn"></div>'+
      '<div class="fld"><label>Contraseña</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>'+
      '<button class="btn" id="loginBtn">Entrar</button>'+
      '<div class="msg '+(cls||"")+'" id="msg">'+(msg||"")+'</div></div>';
    document.getElementById("loginBtn").onclick=doLogin;
    document.getElementById("pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  }
  function doLogin(){
    if(!supa){document.getElementById("msg").className="msg err";document.getElementById("msg").textContent="No cargó la conexión. Revisá tu internet.";return}
    var email=(document.getElementById("email").value||"").trim(), pass=document.getElementById("pass").value||"";
    var b=document.getElementById("loginBtn"); b.disabled=true; b.textContent="Entrando…";
    supa.auth.signInWithPassword({email:email,password:pass}).then(function(r){
      if(r.error){ b.disabled=false; b.textContent="Entrar"; var m=document.getElementById("msg"); m.className="msg err"; m.textContent="Correo o contraseña incorrectos."; return; }
      boot();
    });
  }
  function logout(){ if(supa)supa.auth.signOut().then(function(){location.reload()}); }

  // ---------- Load ----------
  function boot(){
    app.innerHTML='<div class="loading">Cargando catálogo…</div>';
    // try Supabase first, then repo catalog.json as seed
    loadFromCloud().then(function(cloud){
      if(cloud){ DATA=cloud; renderApp(false); return; }
      fetch("../catalog.json?_="+Date.now()).then(function(r){return r.json()}).then(function(j){ DATA=j; renderApp(true); })
        .catch(function(){ app.innerHTML='<div class="loading">No se pudo cargar el catálogo.</div>'; });
    });
  }
  function loadFromCloud(){
    if(!supa) return Promise.resolve(null);
    return supa.from("app_config").select("value").eq("key",CFG_KEY).maybeSingle().then(function(r){
      if(r.error||!r.data||!r.data.value) return null; return r.data.value;
    }).catch(function(){return null});
  }

  // ---------- Render editor ----------
  function renderApp(fromSeed){
    var m=DATA.meta||{};
    var html='<div class="top"><div class="l"><img src="../img/logo.png"/><span class="t">PANEL EL TORITO</span></div>'+
      '<div class="r"><button class="save" id="saveTop">Guardar</button><button class="lo" id="logout">Salir</button></div></div>';
    if(fromSeed) html+='<div class="hint">Estás viendo el catálogo base del sitio. Al <b>Guardar</b> por primera vez se sube a la nube y desde ahí la tienda lo lee en vivo. (Si ves un error al guardar, falta crear la tabla <b>app_config</b> en Supabase — te pasé el SQL.)</div>';
    // meta
    html+='<div class="meta">'+
      metaFld("WhatsApp de pedidos","wa",m.whatsapp||"","tel")+
      metaFld("Envío: base (L)","shipbase",(m.shipping&&m.shipping.base)||50,"number")+
      metaFld("Envío: L por km","shipperkm",(m.shipping&&m.shipping.per_km)||9,"number")+
      metaFld("Ubicación carnicería · latitud","olat",(m.origin&&m.origin.lat)||"","number")+
      metaFld("Ubicación carnicería · longitud","olng",(m.origin&&m.origin.lng)||"","number")+
      '</div>';
    // banner de promoción
    var pr=m.promo||{};
    html+='<div class="meta" style="grid-template-columns:1fr">'+
      '<label style="display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;cursor:pointer"><input type="checkbox" data-meta="promoOn" style="width:18px;height:18px;accent-color:#E4232A"'+(pr.on?" checked":"")+'> Mostrar banner de promoción en la tienda</label>'+
      metaFld("Banner · título (ej: 2x1 en chorizo esta semana)","promoT",pr.title||"","text")+
      metaFld("Banner · subtítulo","promoS",pr.sub||"","text")+
      '</div>';
    // products by category
    var cats=(DATA.categories||[]).map(function(c){return c.id});
    Object.keys(CAT_LABELS).forEach(function(cid){ if(cats.indexOf(cid)<0)cats.push(cid); });
    cats.forEach(function(cid){
      var items=DATA.products.filter(function(p){return p.cat===cid});
      html+='<div class="cat" data-cat="'+cid+'"><h2>'+(CAT_LABELS[cid]||cid)+'<button class="addbtn" data-add="'+cid+'">+ Agregar producto</button></h2>'+
        '<div class="rows">';
      items.forEach(function(p){ html+=rowHtml(p) });
      html+='</div></div>';
    });
    app.innerHTML=html;
    document.getElementById("logout").onclick=logout;
    document.getElementById("saveTop").onclick=doSave;
    bind();
    document.body.insertAdjacentHTML("beforeend",'<div class="savebar" id="savebar"><button id="saveBottom">Guardar cambios</button></div>');
    document.getElementById("saveBottom").onclick=doSave;
    setDirty(false);
  }
  function metaFld(label,key,val,type){return '<div class="fld"><label>'+label+'</label><input data-meta="'+key+'" type="'+(type||"text")+'" value="'+String(val).replace(/"/g,"&quot;")+'"></div>'}
  function rowHtml(p){
    return '<div class="row'+(p.active===false?" off":"")+'" data-id="'+p.id+'">'+
      '<input class="nm" value="'+(p.name||"").replace(/"/g,"&quot;")+'" placeholder="Nombre">'+
      '<input class="pr" type="number" inputmode="decimal" placeholder="a cotizar" value="'+(p.price==null?"":p.price)+'">'+
      '<select class="ty"><option value="libra"'+(p.unit==="libra"&&!p.validate?" selected":"")+'>Libra</option><option value="libra-pesa"'+(p.unit==="libra"&&p.validate?" selected":"")+'>Libra · se pesa</option><option value="paquete"'+(p.unit==="paquete"?" selected":"")+'>Paquete</option></select>'+
      '<button class="tg'+(p.active!==false?" on":"")+'" title="Mostrar/ocultar">'+(p.active!==false?"✓":"—")+'</button>'+
      '<button class="del" title="Eliminar">✕</button>'+
      '<input class="desc" placeholder="Descripción que vende (ej: Fino y tierno, listo para el sartén.)" value="'+((p.desc||"")).replace(/"/g,"&quot;")+'">'+
      '<div class="cutswrap"><input class="cuts" placeholder="Cortes (separados por coma, ej: En bistec, En cubitos)" value="'+((p.cuts||[]).join(", ")).replace(/"/g,"&quot;")+'">'+
      '<input class="mx" type="number" inputmode="decimal" placeholder="máx/pedido" title="Máx por pedido antes de pasar a bajo pedido (vacío = default)" value="'+(p.max==null?"":p.max)+'"></div></div>';
  }
  function bind(){
    app.addEventListener("input",function(e){ if(e.target.closest(".row")||e.target.dataset.meta) setDirty(true); });
    app.addEventListener("click",function(e){
      var add=e.target.closest("[data-add]");
      if(add){ addProduct(add.dataset.add); return; }
      var row=e.target.closest(".row"); if(!row) return;
      if(e.target.closest(".tg")){ var t=e.target.closest(".tg"); var on=t.classList.toggle("on"); t.textContent=on?"✓":"—"; row.classList.toggle("off",!on); setDirty(true); }
      else if(e.target.closest(".del")){ if(confirm("¿Eliminar este producto?")){ row.remove(); setDirty(true); } }
    });
  }
  function addProduct(cid){
    var rows=document.querySelector('.cat[data-cat="'+cid+'"] .rows');
    var id=cid+"-"+Date.now().toString(36);
    rows.insertAdjacentHTML("beforeend",rowHtml({id:id,name:"",price:0,type:"libra",active:true,cat:cid}));
    setDirty(true);
    var last=rows.lastElementChild.querySelector(".nm"); if(last)last.focus();
  }
  function setDirty(v){ dirty=v; var sb=document.getElementById("savebar"); if(sb)sb.classList.toggle("show",v); }

  // ---------- Save ----------
  function collect(){
    var meta=DATA.meta||{};
    document.querySelectorAll("[data-meta]").forEach(function(i){
      var k=i.dataset.meta;
      if(k==="wa")meta.whatsapp=i.value.trim();
      else if(k==="shipbase"){meta.shipping=meta.shipping||{};meta.shipping.base=Number(i.value)||50;}
      else if(k==="shipperkm"){meta.shipping=meta.shipping||{};meta.shipping.per_km=Number(i.value)||9;}
      else if(k==="olat"){meta.origin=meta.origin||{};meta.origin.lat=Number(i.value);}
      else if(k==="olng"){meta.origin=meta.origin||{};meta.origin.lng=Number(i.value);}
      else if(k==="promoOn"){meta.promo=meta.promo||{};meta.promo.on=i.checked;}
      else if(k==="promoT"){meta.promo=meta.promo||{};meta.promo.title=i.value.trim();}
      else if(k==="promoS"){meta.promo=meta.promo||{};meta.promo.sub=i.value.trim();}
    });
    var prods=[];
    document.querySelectorAll(".cat").forEach(function(cat){
      var cid=cat.dataset.cat;
      cat.querySelectorAll(".row").forEach(function(r){
        var name=r.querySelector(".nm").value.trim(); if(!name) return;
        var cr=(r.querySelector(".cuts").value||"").trim(); var cuts=cr?cr.split(",").map(function(x){return x.trim()}).filter(Boolean):null;
        var tyv=r.querySelector(".ty").value; var pv=(r.querySelector(".pr").value||"").trim(); var price=pv===""?null:(Number(pv)||0);
        var mxEl=r.querySelector(".mx"); var mxv=mxEl?(mxEl.value||"").trim():""; var mx=mxv===""?null:(Number(mxv)||null);
        var dscEl=r.querySelector(".desc"); var dsc=dscEl?(dscEl.value||"").trim():"";
        var prod={id:r.dataset.id,cat:cid,name:name,price:price,unit:(tyv==="paquete"?"paquete":"libra"),active:r.querySelector(".tg").classList.contains("on")};
        if(tyv==="libra-pesa")prod.validate=true; if(price==null)prod.quote=true; if(cuts&&cuts.length)prod.cuts=cuts; if(mx!=null)prod.max=mx; if(dsc)prod.desc=dsc; prods.push(prod);
      });
    });
    var d={meta:meta,categories:DATA.categories,products:prods};
    return d;
  }
  function doSave(){
    var d=collect(); DATA=d;
    var btns=document.querySelectorAll("#saveTop,#saveBottom"); btns.forEach(function(b){b.disabled=true;b.textContent="Guardando…"});
    supa.from("app_config").upsert({key:CFG_KEY,value:d,updated_at:new Date().toISOString()}).then(function(r){
      btns.forEach(function(b){b.disabled=false});
      document.getElementById("saveTop").textContent="Guardar"; var bb=document.getElementById("saveBottom"); if(bb)bb.textContent="Guardar cambios";
      if(r.error){ alert("No se pudo guardar en la nube.\n\n"+r.error.message+"\n\n(Si dice que falta la tabla app_config, hay que crearla en Supabase — te pasé el SQL.)"); return; }
      setDirty(false); toast("Guardado ✓ La tienda ya muestra los cambios.");
    });
  }
  function toast(t){ var d=document.createElement("div"); d.textContent=t; d.style.cssText="position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#232323;color:#f2f2f2;padding:12px 18px;border-radius:100px;z-index:50;font-weight:600;font-size:14px;border:1px solid #25D366"; document.body.appendChild(d); setTimeout(function(){d.remove()},2600); }

  // ---------- init ----------
  if(!supa){ loginView("No cargó la librería. Revisá tu internet y recargá.","err"); return; }
  supa.auth.getSession().then(function(r){ if(r.data&&r.data.session) boot(); else loginView(); });
})();
</script>
</body>
</html>
